version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    profiles: ["local-only"]
    environment:
      POSTGRES_DB: noisia_studio_dev
      POSTGRES_USER: noisia
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  bull-board:
    image: deadly0/bull-board:latest
    ports:
      - "3030:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
